<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harsh Hospital AI Assistant</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, #eaf4ff, #ffffff);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow: hidden;
        }

        .chatbot {
            width: 100%;
            max-width: 430px;
            height: 720px;
            background: #fff;
            border-radius: 25px;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .15);
            display: flex;
            flex-direction: column;
            animation: zoom .8s ease;
        }

        .chat-header {
            background: linear-gradient(135deg, #0d6efd, #47a6ff);
            color: #fff;
            padding: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .bot-icon {
            width: 55px;
            height: 55px;
            background: #fff;
            color: #0d6efd;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 28px;
            animation: spin 5s linear infinite;
        }

        .chat-header h2 {
            font-size: 22px;
        }

        .chat-header p {
            font-size: 12px;
            opacity: .9;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            border: none;
            background: #fff;
            color: #0d6efd;
            padding: 10px 14px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
            transition: .3s;
        }

        .lang-btn:hover {
            transform: scale(1.05);
        }

        .chat-body {
            flex: 1;
            padding: 18px;
            overflow-y: auto;
            background: #f8fbff;
            scroll-behavior: smooth;
        }

        .msg {
            max-width: 85%;
            padding: 12px 15px;
            margin-bottom: 14px;
            border-radius: 18px;
            font-size: 15px;
            line-height: 1.5;
            animation: fade .5s ease;
            white-space: pre-line;
        }

        .bot {
            background: #e8f2ff;
            color: #222;
            border-bottom-left-radius: 5px;
        }

        .user {
            background: #0d6efd;
            color: #fff;
            margin-left: auto;
            border-bottom-right-radius: 5px;
        }

        .typing {
            width: fit-content;
            display: flex;
            gap: 5px;
            align-items: center;
        }

        .typing span {
            width: 8px;
            height: 8px;
            background: #0d6efd;
            border-radius: 50%;
            animation: bounce 1s infinite;
        }

        .typing span:nth-child(2) {
            animation-delay: .2s;
        }

        .typing span:nth-child(3) {
            animation-delay: .4s;
        }

        .quick-questions {
            padding: 15px;
            background: #fff;
            border-top: 1px solid #eee;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            overflow-y: auto;
            max-height: 230px;
        }

        .quick-btn {
            border: none;
            padding: 12px;
            border-radius: 12px;
            background: #eef5ff;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: .3s;
        }

        .quick-btn:hover {
            background: #0d6efd;
            color: #fff;
            transform: translateY(-3px);
        }

        .chat-footer {
            padding: 12px;
            text-align: center;
            font-size: 12px;
            color: #777;
            background: #fff;
        }

        .floating-buttons {
            position: fixed;
            bottom: 20px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 1000;
        }

        .float-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            font-size: 26px;
            color: #fff;
            box-shadow: 0 8px 20px rgba(0, 0, 0, .2);
            transition: .3s;
        }

        .float-btn:hover {
            transform: scale(1.1);
        }

        .whatsapp {
            background: #25D366;
        }

        .call {
            background: #0d6efd;
        }

        body.dark {
            background: linear-gradient(135deg, #111, #1e1e1e);
        }

        body.dark .chatbot {
            background: #1c1c1c;
            box-shadow: 0 20px 50px rgba(0, 0, 0, .5);
        }

        body.dark .chat-body {
            background: #111;
        }

        body.dark .quick-questions {
            background: #1c1c1c;
            border-top: 1px solid #333;
        }

        body.dark .chat-footer {
            background: #1c1c1c;
            color: #aaa;
        }

        body.dark .bot {
            background: #2a2a2a;
            color: #fff;
        }

        body.dark .quick-btn {
            background: #2a2a2a;
            color: #fff;
        }

        body.dark .quick-btn:hover {
            background: #0d6efd;
        }

        body.dark .lang-btn {
            background: #2a2a2a;
            color: #fff;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes fade {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes zoom {
            from {
                opacity: 0;
                transform: scale(.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes bounce {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-5px);
            }
        }

        @media(max-width:500px) {
            .chatbot {
                height: 100vh;
                max-width: 100%;
                border-radius: 0;
            }

            .quick-questions {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>

    <div class="chatbot">

        <div class="chat-header">

            <div class="left">

                <div class="bot-icon">🤖</div>

                <div>
                    <h2 id="title">Harsh Hospital AI</h2>
                    <p id="status">Online • Instant Help</p>
                </div>

            </div>

            <div class="header-buttons">
                <button class="lang-btn" onclick="toggleTheme()" id="themeBtn">🌙</button>
                <button class="lang-btn" onclick="toggleLang()" id="langBtn">हिंदी</button>
            </div>

        </div>

        <div class="chat-body" id="chatBody">

            <div class="msg bot">
                Hello 👋 Welcome to Harsh Hospital. How may I help you today?
            </div>

        </div>

        <div class="quick-questions" id="questionBox"></div>

        <div class="chat-footer">
            Powered by Harsh Hospital Smart AI
        </div>

    </div>

    <div class="floating-buttons">

        <a href="tel:+919431046932" class="float-btn call">
            📞
        </a>

        <a href="https://wa.me/919431046932" target="_blank" class="float-btn whatsapp">
            💬
        </a>

    </div>

    <script>

        let hindi = false;

        const englishQuestions = [
            "Doctor Available?",
            "Book Appointment",
            "Emergency Number",
            "OPD Timing",
            "Cardiology Dept",
            "Child Specialist",
            "X-Ray Available?",
            "MRI Scan",
            "ICU Beds",
            "Cashless Insurance",
            "Pathology Test",
            "24x7 Ambulance",
            "Dentist",
            "Location",
            "Contact Number"
        ];

        const hindiQuestions = [
            "डॉक्टर उपलब्ध हैं?",
            "अपॉइंटमेंट बुक करें",
            "इमरजेंसी नंबर",
            "ओपीडी टाइम",
            "कार्डियोलॉजी विभाग",
            "बाल रोग विशेषज्ञ",
            "एक्स-रे उपलब्ध है?",
            "MRI स्कैन",
            "ICU बेड",
            "कैशलेस सुविधा",
            "पैथोलॉजी टेस्ट",
            "24x7 एम्बुलेंस",
            "डेंटिस्ट",
            "लोकेशन",
            "संपर्क नंबर"
        ];

        const chatBody = document.getElementById("chatBody");
        const questionBox = document.getElementById("questionBox");

        loadQuestions();

        function toggleLang() {

            hindi = !hindi;

            chatBody.innerHTML = "";

            if (hindi) {

                document.getElementById("title").innerText = "हर्ष हॉस्पिटल AI";
                document.getElementById("status").innerText = "ऑनलाइन • तुरंत सहायता";
                document.getElementById("langBtn").innerText = "English";

                addBot("नमस्ते 👋 हर्ष हॉस्पिटल में आपका स्वागत है। मैं आपकी कैसे मदद कर सकता हूँ?");

            } else {

                document.getElementById("title").innerText = "Harsh Hospital AI";
                document.getElementById("status").innerText = "Online • Instant Help";
                document.getElementById("langBtn").innerText = "हिंदी";

                addBot("Hello 👋 Welcome to Harsh Hospital. How may I help you today?");
            }

            loadQuestions();
        }

        function loadQuestions() {

            questionBox.innerHTML = "";

            let arr = hindi ? hindiQuestions : englishQuestions;

            arr.forEach(q => {

                let btn = document.createElement("button");

                btn.className = "quick-btn";

                btn.innerText = q;

                btn.onclick = function () {
                    reply(q);
                };

                questionBox.appendChild(btn);

            });
        }

        function reply(question) {

            addUser(question);

            showTyping();

            setTimeout(() => {

                removeTyping();

                let ans = "Please contact reception.";

                if (!hindi) {

                    if (question === "Doctor Available?")
                        ans = "Yes ✅ 10+ doctors available today.";

                    else if (question === "Book Appointment")
                        ans = "Call +91 9431046932 to book appointment.";

                    else if (question === "Emergency Number")
                        ans = "🚑 Emergency: +91 9431046932";

                    else if (question === "OPD Timing")
                        ans = "OPD Timing: 9 AM to 8 PM.";

                    else if (question === "Cardiology Dept")
                        ans = "Heart specialist available Monday to Saturday.";

                    else if (question === "Child Specialist")
                        ans = "Pediatric doctor available daily.";

                    else if (question === "X-Ray Available?")
                        ans = "Yes ✅ 24x7 digital X-Ray available.";

                    else if (question === "MRI Scan")
                        ans = "MRI available from 8 AM to 10 PM.";

                    else if (question === "ICU Beds")
                        ans = "Currently 3 ICU beds available.";

                    else if (question === "Cashless Insurance")
                        ans = "Yes 💳 Cashless insurance available.";

                    else if (question === "Pathology Test")
                        ans = "All blood and lab tests available.";

                    else if (question === "24x7 Ambulance")
                        ans = "🚑 Ambulance available 24x7.";

                    else if (question === "Dentist")
                        ans = "Dental specialist available daily.";

                    else if (question === "Location")
                        ans = `Harsh Hospital,
Chanakya Vihar Colony,
Brahmpur (Beur),
Patna - 800030,
Bihar, India.`;

                    else if (question === "Contact Number")
                        ans = "📞 +91 9431046932";

                } else {

                    if (question === "डॉक्टर उपलब्ध हैं?")
                        ans = "हाँ ✅ आज 10+ डॉक्टर उपलब्ध हैं।";

                    else if (question === "अपॉइंटमेंट बुक करें")
                        ans = "बुकिंग हेतु कॉल करें +91 9431046932";

                    else if (question === "इमरजेंसी नंबर")
                        ans = "🚑 +91 9431046932";

                    else if (question === "ओपीडी टाइम")
                        ans = "ओपीडी समय: सुबह 9 बजे से रात 8 बजे तक।";

                    else if (question === "कार्डियोलॉजी विभाग")
                        ans = "हार्ट विशेषज्ञ सोमवार से शनिवार उपलब्ध हैं।";

                    else if (question === "बाल रोग विशेषज्ञ")
                        ans = "बाल रोग विशेषज्ञ रोज उपलब्ध हैं।";

                    else if (question === "एक्स-रे उपलब्ध है?")
                        ans = "हाँ 24x7 डिजिटल एक्स-रे उपलब्ध है।";

                    else if (question === "MRI स्कैन")
                        ans = "MRI सुबह 8 बजे से रात 10 बजे तक उपलब्ध है।";

                    else if (question === "ICU बेड")
                        ans = "अभी 3 ICU बेड खाली हैं।";

                    else if (question === "कैशलेस सुविधा")
                        ans = "हाँ 💳 सुविधा उपलब्ध है।";

                    else if (question === "पैथोलॉजी टेस्ट")
                        ans = "सभी ब्लड व लैब टेस्ट उपलब्ध हैं।";

                    else if (question === "24x7 एम्बुलेंस")
                        ans = "🚑 एम्बुलेंस 24x7 उपलब्ध है।";

                    else if (question === "डेंटिस्ट")
                        ans = "डेंटल डॉक्टर रोज उपलब्ध हैं।";

                    else if (question === "लोकेशन")
                        ans = `हर्ष हॉस्पिटल,
चाणक्य विहार कॉलोनी,
ब्रह्मपुर (बेरउर),
पटना - 800030,
बिहार, भारत।`;

                    else if (question === "संपर्क नंबर")
                        ans = "📞 +91 9431046932";
                }

                addBot(ans);

            }, 1200);
        }

        function addUser(text) {

            chatBody.innerHTML += `
                <div class="msg user">${text}</div>
            `;

            scrollBottom();
        }

        function addBot(text) {

            chatBody.innerHTML += `
                <div class="msg bot">${text}</div>
            `;

            scrollBottom();
        }

        function showTyping() {

            chatBody.innerHTML += `
                <div class="msg bot typing" id="typing">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            `;

            scrollBottom();
        }

        function removeTyping() {

            const typing = document.getElementById("typing");

            if (typing) {
                typing.remove();
            }
        }

        function scrollBottom() {
            chatBody.scrollTop = chatBody.scrollHeight;
        }

        function toggleTheme() {

            document.body.classList.toggle("dark");

            const btn = document.getElementById("themeBtn");

            if (document.body.classList.contains("dark")) {
                btn.innerText = "☀️";
            } else {
                btn.innerText = "🌙";
            }
        }

    </script>

</body>

</html>
