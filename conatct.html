<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <section class="contact-section">
  <h2 class="contact-title">Contact Us</h2>

  <div class="contact-container">

   
    <div class="contact-card">
      <h3>📞 Call Us</h3>
      <p>
        <a href="tel:+919431046932">+91 94310 46932</a>
      </p>
    </div>

    <div class="contact-card">
      <h3>💬 WhatsApp</h3>
     <button>
<a type="submit" href="https://wa.me/919431046932?text=Hello%20I%20need%20help" target="_blank">Whatsapp Chat
</a> </button>
    
    </div>

    <div class="contact-card">
      <h3>⏰ Timing</h3>
      <p>24x7 Emergency Services Available</p>
    </div>
    <div>
        
      <iframe src="https://www.google.com/maps?q=harsh%20hospital%20patna&output=embed"></iframe>
        
    </div>

  </div>
</section>
<style>
    .contact-section {
  padding: 50px 20px;
  background: #f5f9ff;
  text-align: center;
}

.contact-title {
  font-size: 32px;
  margin-bottom: 30px;
  color: #0d47a1;
}

/* Grid Layout */
.contact-container {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 20px;
  max-width: 1100px;
  margin: auto;
}

/* Cards */
.contact-card {
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 4px 15px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.contact-card:hover {
  transform: translateY(-8px);
}

/* Text */
.contact-card h3 {
  margin-bottom: 10px;
  color: #1565c0;
}

.contact-card p {
  color: #555;
}

/* Links */
.contact-card a {
  color: #0d47a1;
  text-decoration: none;
  font-weight: 600;
}

.contact-card a:hover {
  text-decoration: underline;
}

/* 📱 Mobile Responsive */
@media (max-width: 768px) {
  .contact-container {
    grid-template-columns: 1fr;
  }
}
</style>
</body>
</html>
