<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hospital Services</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* Section */
.services {
    padding: 60px 20px;
    background: #f4f8fb;
    text-align: center;
}

.services h2 {
    font-size: 32px;
    margin-bottom: 40px;
}

/* Grid */
.services-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

/* Card */
.service-box {
    background: white;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

/* Mobile */
@media (max-width: 600px) {
    .services h2 {
        font-size: 24px;
    }
}
</style>

</head>

<body>

<section class="services">
    <h2>Our Services</h2>

    <div class="services-container">

        <div class="service-box">
            <h3>Emergency Care</h3>
            <p>24/7 emergency services available.</p>
        </div>

        <div class="service-box">
            <h3>General Checkup</h3>
            <p>Regular health checkups for all.</p>
        </div>

        <div class="service-box">
            <h3>Lab Testing</h3>
            <p>Advanced lab testing facilities.</p>
        </div>

        <div class="service-box">
            <h3>Pharmacy</h3>
            <p>All medicines available.</p>
        </div>

    </div>
</section>

</body>
</html>
